<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>أثر الشهيد - تحميل التطبيق</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .card {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 24px;
      padding: 50px 40px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    .icon {
      font-size: 72px;
      margin-bottom: 20px;
      display: block;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 10px;
      color: #fff;
    }

    .subtitle {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.65);
      margin-bottom: 36px;
      line-height: 1.6;
    }

    .download-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      color: #fff;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 600;
      padding: 16px 36px;
      border-radius: 50px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 8px 24px rgba(106, 17, 203, 0.45);
      width: 100%;
    }

    .download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(106, 17, 203, 0.6);
    }

    .download-btn:active {
      transform: translateY(0);
    }

    .download-icon {
      font-size: 1.3rem;
    }

    .info {
      margin-top: 28px;
      font-size: 0.82rem;
      color: rgba(255, 255, 255, 0.4);
      line-height: 1.7;
    }

    .info span {
      display: block;
    }

    .badge {
      display: inline-block;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.78rem;
      margin-bottom: 28px;
      color: rgba(255, 255, 255, 0.7);
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">📱</span>
    <h1>أثر الشهيد</h1>
    <div class="badge">الإصدار 5</div>
    <p class="subtitle">اضغط على الزر أدناه لتحميل التطبيق على جهازك</p>

    <a class="download-btn" href="/api/download">
      <span class="download-icon">⬇️</span>
      تحميل التطبيق
    </a>

    <div class="info">
      <span>ملف APK مخصص لأجهزة أندرويد</span>
      <span>تأكد من تفعيل خيار "السماح بمصادر غير معروفة" قبل التثبيت</span>
    </div>
  </div>
</body>
</html>
